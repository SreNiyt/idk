name: Build-Virtual-LSPosed
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11' # Changed from 17 to 11
          distribution: 'temurin'
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

- name: Cache Gradle packages
  uses: actions/cache@v3
  with:
    path: |
      ~/.gradle/caches
      ~/.gradle/wrapper
    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
    restore-keys: |
      ${{ runner.os }}-gradle-

- name: Side-load dependencies
  run: |
    mkdir -p app/libs
    # Use wget or curl to fetch the specific files from a mirror that IS allowed
    # Example:
    wget https://your-personal-server.com/libs/stateview-2.2.0.aar -O app/libs/stateview-2.2.0.aar
    # Then build normally

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug -q --stacktrace --refresh-dependencies

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualLSPosed-Final
          path: app/build/outputs/apk/**/*.apk
