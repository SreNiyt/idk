name: Build IdleDimmer APK

# This triggers the build when you push to the main branch
# or when you manually click "Run workflow" in the Actions tab
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Grabs your code from the repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Sets up Java (Standard for Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Makes sure the Gradle wrapper can execute
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Builds the debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Uploads the finished APK so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IdleDimmer-Debug
          # This is the standard output path for an Android Studio project
          path: app/build/outputs/apk/debug/app-debug.apk

