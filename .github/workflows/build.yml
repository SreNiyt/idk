name: Build-Virtual-LSPosed
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Automatically handles caching of dependencies and build outputs
          cache-read-only: false

      - name: Side-load dependencies
        run: |
          mkdir -p app/libs
          # Replace with your actual reliable download source or local path
          # curl -L "https://your-mirror.com/stateview-2.2.0.aar" -o app/libs/stateview-2.2.0.aar

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualLSPosed-Final
          path: app/build/outputs/apk/**/*.apk

